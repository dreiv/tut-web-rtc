<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Minimal Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
      @layer base {
        :root {
          --bg: #fafaf9;
          --text: #44403c;
          --text-h: #1c1917;
          --border: #eaddd7;
          --code-bg: #f5f5f4;
          --accent: #f47121;
          --accent-bg: rgba(244, 113, 33, 0.05);
          --accent-border: rgba(244, 113, 33, 0.25);
          --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
          --sans: "Inter", system-ui, sans-serif;
          --mono: ui-monospace, "Cascadia Code", monospace;
          color-scheme: light dark;
          font-family: var(--sans);
          font-size: 18px;
          line-height: 1.6;
          color: var(--text);
          background-color: var(--bg);
        }
        @media (prefers-color-scheme: dark) {
          :root {
            --bg: #1c1917;
            --text: #a8a29e;
            --text-h: #fafaf9;
            --border: #44403c;
            --code-bg: #292524;
            --accent: #fb923c;
            --accent-bg: rgba(251, 146, 60, 0.1);
          }
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      #app-container {
        width: 100%;
        max-width: 600px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 80vh;
      }

      h1 {
        color: var(--text-h);
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
        opacity: 0.8;
      }

      input {
        background: var(--code-bg);
        border: 1px solid var(--border);
        color: var(--text-h);
        padding: 0.8rem;
        border-radius: 6px;
        font-family: var(--sans);
        font-size: 1rem;
        outline: none;
      }

      button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
      }

      #login-view {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 2rem;
        height: 100%;
      }

      .id-display {
        background: var(--code-bg);
        padding: 1rem;
        border-radius: 8px;
        border: 1px dashed var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      #my-id {
        font-family: var(--mono);
        font-weight: bold;
        color: var(--accent);
      }

      #chat-view {
        display: none;
        flex-direction: column;
        height: 100%;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .msg {
        max-width: 80%;
        padding: 0.6rem 1rem;
        border-radius: 12px;
        font-size: 0.95rem;
        word-wrap: break-word;
      }

      .msg.user {
        align-self: flex-start;
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-bottom-left-radius: 2px;
      }
      .msg.me {
        align-self: flex-end;
        background: var(--accent-bg);
        border: 1px solid var(--accent-border);
        border-bottom-right-radius: 2px;
      }
      .msg.system {
        align-self: center;
        font-size: 0.75rem;
        font-family: var(--mono);
        opacity: 0.6;
        background: none;
        border: none;
      }

      .username {
        font-weight: bold;
        color: var(--accent);
        display: block;
        font-size: 0.75rem;
        margin-bottom: 2px;
      }
      .timestamp {
        font-size: 0.65rem;
        opacity: 0.5;
        margin-left: 6px;
      }

      #input-area {
        padding: 1rem 1.5rem 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
      }
      #input-area input {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="app-container">
      <div id="login-view">
        <h1>Your P2P Identity</h1>
        <p>Set your name and share your ID to start a direct connection.</p>

        <input
          type="text"
          id="username-input"
          placeholder="Your display name..."
          style="margin-bottom: 10px"
        />

        <div class="id-display">
          <span id="my-id">Generating ID...</span>
          <button
            id="copy-btn"
            style="padding: 0.4rem 0.8rem; font-size: 0.8rem"
          >
            Copy ID
          </button>
        </div>

        <div style="display: flex; gap: 10px; width: 100%">
          <input
            type="text"
            id="target-input"
            placeholder="Paste friend's ID..."
            style="flex: 1"
          />
          <button id="join-btn">Connect</button>
        </div>
      </div>

      <div id="chat-view">
        <div id="messages"></div>
        <div id="input-area">
          <input type="text" id="msg-input" placeholder="Message..." />
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>

    <script>
      const peer = new Peer();
      let connections = [];
      let myPeerId = "";
      let myName = "Anonymous";
      const peerNames = new Map();

      const loginView = document.getElementById("login-view");
      const chatView = document.getElementById("chat-view");
      const messagesDiv = document.getElementById("messages");
      const myIdSpan = document.getElementById("my-id");
      const targetInput = document.getElementById("target-input");
      const usernameInput = document.getElementById("username-input");
      const msgInput = document.getElementById("msg-input");

      peer.on("open", (id) => {
        myPeerId = id;
        myIdSpan.textContent = id;
      });

      peer.on("connection", (conn) => {
        setupConnection(conn);
      });

      function setupConnection(conn) {
        conn.on("open", () => {
          if (!connections.find((c) => c.peer === conn.peer)) {
            connections.push(conn);
          }

          // Send name to the new peer immediately
          conn.send({ type: "identity", name: myName });

          conn.on("data", (data) => {
            if (data.type === "identity") {
              peerNames.set(conn.peer, data.name);
              showChat();
              appendMessage({
                type: "system",
                content: `${data.name} connected.`,
              });
            } else {
              const senderName =
                peerNames.get(conn.peer) || "Peer " + conn.peer.substring(0, 5);
              appendMessage({
                username: senderName,
                content: data,
                time: getCurrentTime(),
              });
            }
          });
        });

        conn.on("close", () => {
          const disconnectedName = peerNames.get(conn.peer) || "A peer";
          connections = connections.filter((c) => c !== conn);
          appendMessage({
            type: "system",
            content: `${disconnectedName} left.`,
          });
        });
      }

      function showChat() {
        if (loginView.style.display !== "none") {
          loginView.style.display = "none";
          chatView.style.display = "flex";
          msgInput.focus();
        }
      }

      document.getElementById("copy-btn").onclick = () => {
        navigator.clipboard.writeText(myPeerId);
        const btn = document.getElementById("copy-btn");
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = "Copy ID"), 2000);
      };

      document.getElementById("join-btn").onclick = () => {
        const name = usernameInput.value.trim();
        const targetId = targetInput.value.trim();
        if (name && targetId) {
          myName = name;
          const conn = peer.connect(targetId);
          setupConnection(conn);
        } else {
          alert("Please enter a name and Target ID!");
        }
      };

      document.getElementById("send-btn").onclick = handleSend;
      msgInput.onkeydown = (e) => {
        if (e.key === "Enter") handleSend();
      };

      function handleSend() {
        const content = msgInput.value.trim();
        if (content && connections.length > 0) {
          connections.forEach((conn) => conn.send(content));
          appendMessage({
            username: "me",
            content: content,
            time: getCurrentTime(),
          });
          msgInput.value = "";
          msgInput.focus();
        }
      }

      function appendMessage(data) {
        const msgEl = document.createElement("div");
        if (data.type === "system") {
          msgEl.className = "msg system";
          msgEl.textContent = data.content;
        } else {
          const isMe = data.username === "me";
          msgEl.className = `msg ${isMe ? "me" : "user"}`;
          msgEl.innerHTML = `
            <span class="username">${isMe ? "You" : data.username} <span class="timestamp">${data.time}</span></span>
            <div>${data.content}</div>
          `;
        }
        messagesDiv.appendChild(msgEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function getCurrentTime() {
        return new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }
    </script>
  </body>
</html>
